services:
  senter-agent:
    build:
      context: ./hermes-agent
      dockerfile: Dockerfile
      args:
        HERMES_UID: "1000"
    image: senter-agent:hermes-sandbox
    environment:
      HERMES_HOME: /opt/data/.hermes
      HERMES_TUI: "1"
      SENTER_GOOP_ROOT: /opt/data/goop
      SENTER_GOOP_PROFILE: /opt/data/goop/profile
    volumes:
      - ./hermes-home:/opt/data/.hermes
      - ./goop:/opt/data/goop:ro
      - ./goop/profiles/${GOOP_PROFILE:-base}:/opt/data/goop/profile:ro
      - ./herm-sovth:/opt/data/herm-sovth:ro
      - ./hermes-android:/opt/data/hermes-android:ro
    stdin_open: true
    tty: true
    command: ["hermes", "--tui"]
